<div class="flex flex-col flex-auto w-full">
    <div class="flex flex-wrap w-full max-w-screen-xl mx-auto p-6 md:p-8">
        <div class="flex items-center justify-between w-full">
            <div>
                <h2 class="text-3xl font-semibold tracking-tight leading-8">History and analytics</h2>
                <div class="font-medium tracking-tight text-secondary">Keep track of your searching recipe status</div>
            </div>
            <div class="flex items-center ml-6">
                <button
                        class="bg-accent"
                        mat-flat-button
                        [color]="'accent'">
                    <mat-icon
                            class="icon-size-5"
                            [svgIcon]="'heroicons_solid:arrow-down-tray'"></mat-icon>
                    <span class="ml-2">Import</span>
                </button>

                <button
                        class="hidden sm:inline-flex ml-3"
                        mat-flat-button
                        (click)="exportHistory()"
                        [color]="'primary'">
                    <mat-icon
                            class="icon-size-5"
                            [svgIcon]="'heroicons_solid:arrow-up-tray'"></mat-icon>
                    <span class="ml-2">Export</span>
                </button>

                <!-- Actions menu (visible on xs) -->
                <div class="sm:hidden">
                    <button
                            [matMenuTriggerFor]="actionsMenu"
                            mat-icon-button>
                        <mat-icon [svgIcon]="'heroicons_mini:ellipsis-vertical'"></mat-icon>
                    </button>
                    <mat-menu #actionsMenu="matMenu">
                        <button mat-menu-item>Import</button>
                        <button mat-menu-item (click)="exportHistory()">Export</button>
                    </mat-menu>
                </div>
            </div>
        </div>
    </div>
</div>
