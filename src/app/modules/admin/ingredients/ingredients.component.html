<div class="sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden bg-card dark:bg-transparent">
    <div
        class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b"
    >
        <!-- Header -->
        <div class="flex items-center justify-between w-full">
            <!-- Title -->
            <div class="text-4xl font-extrabold tracking-tight ng-tns-c1989091593-140">Ingredients</div>

            <!-- Actions -->
            <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
                <form class="flex flex-auto" [formGroup]="filters">
                    <!-- Search -->
                    <mat-form-field
                        [subscriptSizing]="'dynamic'"
                        class="fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript w-80 sm:ml-4"
                    >
                        <mat-icon matPrefix [svgIcon]="'heroicons_outline:magnifying-glass'"></mat-icon>
                        <input
                            matInput
                            [formControlName]="'search'"
                            [autocomplete]="'off'"
                            [placeholder]="'Search ingredients'"
                        />
                    </mat-form-field>
                </form>
            </div>
        </div>
    </div>

    <div class="flex flex-auto overflow-hidden">
        <div class="flex flex-col flex-auto sm:mb-8 overflow-hidden sm:overflow-y-auto">
            <div class="flex mt-8 justify-center flex-wrap gap-1.5">
                <img
                    *ngFor="let ingredient of ingredients$ | async; trackBy: trackByFn"
                    [matTooltip]="ingredient.name"
                    class="w-14 h-14 rounded object-cover"
                    [ngSrc]="'assets/images/ingredients/' + ingredient.name + '.png'"
                    [alt]="ingredient.name"
                    height="56"
                    width="56"
                />
            </div>
        </div>
    </div>
</div>
